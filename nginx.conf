# AI Lab portal — static site + /me.json reflector of Authentik headers.
# Traefik injects X-Authentik-* on every request that made it past
# ForwardAuth, so here we just surface them to the browser as JSON.
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reflect Authentik ForwardAuth headers so the browser can greet the
    # user by name. Values with ' or \ would break JSON — we don't allow
    # those in usernames, so a plain concatenated response is fine.
    location = /me.json {
        default_type application/json;
        add_header Cache-Control "no-store, max-age=0" always;
        return 200 '{"username":"$http_x_authentik_username","email":"$http_x_authentik_email","name":"$http_x_authentik_name","groups":"$http_x_authentik_groups","uid":"$http_x_authentik_uid"}';
    }

    # Light in-browser caching; the page is tiny.
    location ~* \.(?:html)$ {
        add_header Cache-Control "no-store" always;
    }
    location ~* \.(?:svg|png|ico|woff2)$ {
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Security posture
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ =404;
    }
}
